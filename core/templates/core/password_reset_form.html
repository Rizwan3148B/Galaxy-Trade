{% extends 'core/base.html' %}
{% block content %}
<style>
    /* Adding our cosmic styles for the input fields */
    .auth-form input { width: 100%; padding: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid cyan; color: white; border-radius: 5px; box-sizing: border-box; }
    .auth-form label { color: cyan; font-family: monospace; display: block; margin-bottom: 5px; }
    .auth-form ul { color: red; font-size: 12px; list-style-type: none; padding: 0; }
</style>

<div style="max-width: 400px; margin: 100px auto;" class="cosmic-box auth-form">
    <h2 style="color: cyan; text-align: center; border-bottom: 1px solid cyan; padding-bottom: 10px;">ENTER NEW CODE</h2>
    
    {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width: 100%; padding: 12px; background: magenta; color: black; font-weight: bold; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">UPDATE PASSWORD</button>
        </form>
    {% else %}
        <p style="color: red; text-align: center; font-weight: bold; margin-top: 20px;">SYSTEM ERROR: This reset link is invalid or has already been used.</p>
        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'password_reset' %}" style="color: cyan; text-decoration: none;">Request a new transmission link.</a>
        </div>
    {% endif %}
</div>
{% endblock %}
