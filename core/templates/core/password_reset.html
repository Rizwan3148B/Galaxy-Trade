{% extends 'core/base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 100px auto;" class="cosmic-box auth-form">
    <h2 style="color: cyan; text-align: center;">RESET SECURITY CODE</h2>
    <p style="color: white; text-align: center;">Enter your registered email address to receive a reset link.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 12px; background: cyan; color: black; font-weight: bold; border-radius: 5px;">SEND TRANSMISSION</button>
    </form>
</div>
{% endblock %}
